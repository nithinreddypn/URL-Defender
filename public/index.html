    <!-- Theme Initialization -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('urld-theme') || 'dark';
          var r = t === 'system'
            ? (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
            : t;
          var d = document.documentElement;
          d.classList.remove('light','dark');
          d.classList.add(r);
        } catch(e) {}
      })();
    </script>
    
    <!-- Non-blocking font load -->
    <script>
      (function(){
        var href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap';
        function load(){
          var l=document.createElement('link');
          l.rel='stylesheet';l.href=href;l.media='all';
          document.head.appendChild(l);
        }
        if('requestIdleCallback' in window){requestIdleCallback(load,{timeout:1500});}
        else{window.addEventListener('load',function(){setTimeout(load,0);});}
      })();
    </script>
